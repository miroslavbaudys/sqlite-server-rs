name: Feature request
description: Suggest an idea or improvement for sqlite-server-rs
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For larger changes, please open this
        before sending a pull request so we can agree on the approach.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the request (use cases, references).
    validations:
      required: false
